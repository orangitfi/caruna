name: 'Terraform CI/CD'

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: eu-north-1
  TF_WORKSPACE: ${{ github.ref == 'refs/heads/main' && 'prod' || 'staging' }}

jobs:
  validate:
    name: 'Validate'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.0.0'

      - name: Terraform Format
        run: terraform fmt -check
        working-directory: environments/${{ env.TF_WORKSPACE }}

      - name: Terraform Init
        run: terraform init
        working-directory: environments/${{ env.TF_WORKSPACE }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: environments/${{ env.TF_WORKSPACE }}

      - name: Terraform Plan
        run: terraform plan -no-color
        working-directory: environments/${{ env.TF_WORKSPACE }}

  test:
    name: 'Test'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.0.0'

      - name: Run Terratest
        run: |
          go test -v ./tests/...
        working-directory: environments/${{ env.TF_WORKSPACE }}

  security:
    name: 'Security Scan'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: environments/${{ env.TF_WORKSPACE }}

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: environments/${{ env.TF_WORKSPACE }}

  deploy:
    name: 'Deploy'
    needs: security
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.0.0'

      - name: Terraform Init
        run: terraform init
        working-directory: environments/${{ env.TF_WORKSPACE }}

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve
        working-directory: environments/${{ env.TF_WORKSPACE }}

      - name: Terraform Apply (Staging)
        if: github.ref == 'refs/heads/staging'
        run: terraform apply -auto-approve
        working-directory: environments/${{ env.TF_WORKSPACE }} 