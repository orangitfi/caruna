# This workflow handles code quality checks for the project
# It performs linting for both the application code and Docker configurations
# The workflow is designed to be called by other workflows with a specific reference

name: Python Code Quality

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
        default: "main"
        description: "The git reference (branch/tag) to check out for quality checks"

jobs:
  # Runs JavaScript/TypeScript linting checks using npm
  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npm install
      - run: npm run lint

  # Lints the backend Dockerfile for best practices and potential issues
  docker-lint-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Docker lint backend
        uses: ./.github/actions/docker-lint
        with:
          working-directory: "."
          dockerfile: "devops/docker/backend/Dockerfile"

  # Lints the frontend Dockerfile for best practices and potential issues
  docker-lint-ftontend:
    runs-on: ubuntu-latest
    steps:
      - name: Docker lint backend
        uses: ./.github/actions/docker-lint
        with:
          working-directory: "."
          dockerfile: "devops/docker/frontend/Dockerfile"

  # Performs static code analysis using SonarQube
  # This job analyzes code quality, security vulnerabilities, and code coverage
  # Required secrets:
  #   - SONAR_TOKEN: Authentication token for SonarQube server
  #   - SONAR_HOST_URL: URL of your SonarQube server
  sonarqube:
    runs-on: ubuntu-latest
    needs: [linting]  # Run after linting is complete
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for SonarQube to analyze all branches
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sonarqube-api
      
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}  # Authentication token for SonarQube
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}  # SonarQube server URL
        with:
          args: >
            # Project identification
            -Dsonar.projectKey=${{ github.repository }}  # Unique identifier for the project
            -Dsonar.projectName=${{ github.repository }}  # Display name in SonarQube
            
            # Coverage report paths
            -Dsonar.python.coverage.reportPaths=coverage.xml  # Python coverage report location
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info  # JavaScript coverage report location